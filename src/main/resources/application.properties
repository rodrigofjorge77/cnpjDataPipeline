spring.application.name=cnpjDataPipeline

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cnpj}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# Pipeline settings
pipeline.batch-size=${BATCH_SIZE:500000}
pipeline.temp-dir=${TEMP_DIR:./temp}
pipeline.download-workers=${DOWNLOAD_WORKERS:4}
pipeline.process-workers=${PROCESS_WORKERS:1}
pipeline.retry-attempts=${RETRY_ATTEMPTS:3}
pipeline.retry-delay-seconds=${RETRY_DELAY:5}
pipeline.keep-downloaded-files=${KEEP_DOWNLOADED_FILES:false}
pipeline.loading-strategy=${LOADING_STRATEGY:upsert}
pipeline.output-format=${OUTPUT_FORMAT:postgres}
pipeline.parquet-output-dir=${PARQUET_OUTPUT_DIR:./parquet}

# WebDAV
pipeline.base-url=${BASE_URL:https://arquivos.receitafederal.gov.br/public.php/webdav}
pipeline.share-token=${SHARE_TOKEN:YggdBLfdninEJX9}

# Disable web server (batch application)
spring.main.web-application-type=none
